name: Deploy to Azure

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - ".github/workflows/deploy.yml"

permissions:
  contents: read
  id-token: write

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 11.7.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: pnpm

      - name: Install, test, and build
        run: |
          pnpm install --frozen-lockfile
          pnpm test
          pnpm typecheck
          pnpm build
          bash -n scripts/*.sh

      - name: Audit npm dependencies
        continue-on-error: true
        run: pnpm audit --prod

      - name: Compile Bicep templates
        run: |
          az bicep install
          for template in infra/*.bicep; do
            az bicep build --file "$template" --stdout >/dev/null
          done

      - name: Log in to Azure with OIDC
        uses: azure/login@2dd0bbf4064d5a1812889dc200bb8eed2597f82a # v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Build and deploy immutable image
        env:
          AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
          IMAGE_TAG: ${{ github.sha }}
          APP_BASE_URL: ${{ vars.APP_BASE_URL || 'https://airco-tracker.eu' }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_PRICE_WEEKLY_BASIC: ${{ vars.STRIPE_PRICE_WEEKLY_BASIC }}
          STRIPE_PRICE_WEEKLY_PRIORITY: ${{ vars.STRIPE_PRICE_WEEKLY_PRIORITY }}
          STRIPE_PRICE_MONTHLY_BASIC: ${{ vars.STRIPE_PRICE_MONTHLY_BASIC }}
          STRIPE_PRICE_MONTHLY_PRIORITY: ${{ vars.STRIPE_PRICE_MONTHLY_PRIORITY }}
        run: ./scripts/deploy.sh

      - name: Write deployment summary
        if: success()
        env:
          AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
        run: |
          APP_FQDN="$(az containerapp show -n airco-tracking-web -g "$AZURE_RESOURCE_GROUP" --query properties.configuration.ingress.fqdn -o tsv)"
          {
            echo "## Azure deployment"
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- App: [airco-tracking-web](https://${APP_FQDN})"
            echo "- Resource group: \`${AZURE_RESOURCE_GROUP}\`"
          } >> "$GITHUB_STEP_SUMMARY"

name: Deploy to Azure

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - ".github/workflows/deploy.yml"

permissions:
  contents: read
  id-token: write

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 11.7.0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: "22"
          cache: pnpm

      - name: Install, test, and build
        run: |
          pnpm install --frozen-lockfile
          pnpm test
          pnpm typecheck
          pnpm build
          bash -n scripts/*.sh

      - name: Audit npm dependencies
        run: pnpm audit --prod --audit-level high

      - name: Run browser accessibility smoke tests
        run: |
          pnpm exec playwright install --with-deps chromium
          pnpm test:e2e

      - name: Compile Bicep templates
        run: |
          az bicep install
          for template in infra/*.bicep; do
            az bicep build --file "$template" --stdout >/dev/null
          done

      - name: Log in to Azure with OIDC
        uses: azure/login@2dd0bbf4064d5a1812889dc200bb8eed2597f82a # v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Build and deploy immutable image
        env:
          AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
          IMAGE_TAG: ${{ github.sha }}
          APP_BASE_URL: ${{ vars.APP_BASE_URL || 'https://airco-tracker.eu' }}
          AUTH_EMAIL_CODE_BUDGET_PER_HOUR: ${{ vars.AUTH_EMAIL_CODE_BUDGET_PER_HOUR || '5' }}
          AUTH_IP_CODE_BUDGET_PER_HOUR: ${{ vars.AUTH_IP_CODE_BUDGET_PER_HOUR || '20' }}
          AUTH_GLOBAL_CODE_BUDGET_PER_HOUR: ${{ vars.AUTH_GLOBAL_CODE_BUDGET_PER_HOUR || '1000' }}
          AUTH_CODE_HMAC_PEPPER_VERSION: ${{ vars.AUTH_CODE_HMAC_PEPPER_VERSION || 'v1' }}
          ACS_EMAIL_DOMAIN_NAME: ${{ vars.ACS_EMAIL_DOMAIN_NAME || 'AzureManagedDomain' }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_PRICE_ALERTS_PASS: ${{ vars.STRIPE_PRICE_ALERTS_PASS }}
          STRIPE_PRICE_RADAR_PASS: ${{ vars.STRIPE_PRICE_RADAR_PASS }}
          STRIPE_PRICE_RADAR_UPGRADE: ${{ vars.STRIPE_PRICE_RADAR_UPGRADE }}
          LEGAL_OPERATOR_NAME: ${{ secrets.LEGAL_OPERATOR_NAME }}
          LEGAL_OPERATOR_ADDRESS: ${{ secrets.LEGAL_OPERATOR_ADDRESS }}
          LEGAL_PUBLICATION_DIRECTOR: ${{ secrets.LEGAL_PUBLICATION_DIRECTOR }}
          LEGAL_HOST_NAME: ${{ secrets.LEGAL_HOST_NAME }}
          LEGAL_HOST_ADDRESS: ${{ secrets.LEGAL_HOST_ADDRESS }}
          LEGAL_HOST_PHONE: ${{ secrets.LEGAL_HOST_PHONE }}
          LEGAL_CONTACT_EMAIL: ${{ secrets.LEGAL_CONTACT_EMAIL }}
          LEGAL_CONTACT_PHONE: ${{ secrets.LEGAL_CONTACT_PHONE }}
          LEGAL_PRIVACY_EMAIL: ${{ secrets.LEGAL_PRIVACY_EMAIL }}
          LEGAL_WITHDRAWAL_EMAIL: ${{ secrets.LEGAL_WITHDRAWAL_EMAIL }}
          LEGAL_FR_MEDIATOR_NAME: ${{ secrets.LEGAL_FR_MEDIATOR_NAME }}
          LEGAL_FR_MEDIATOR_ADDRESS: ${{ secrets.LEGAL_FR_MEDIATOR_ADDRESS }}
          LEGAL_FR_MEDIATOR_URL: ${{ secrets.LEGAL_FR_MEDIATOR_URL }}
          LEGAL_BUSINESS_REGISTRATION_STATUS: ${{ secrets.LEGAL_BUSINESS_REGISTRATION_STATUS }}
          LEGAL_BUSINESS_REGISTRATION_LEGAL_CONFIRMATION: ${{ vars.LEGAL_BUSINESS_REGISTRATION_LEGAL_CONFIRMATION || 'false' }}
          LEGAL_KVK_NUMBER: ${{ secrets.LEGAL_KVK_NUMBER }}
          LEGAL_VAT_STATUS: ${{ secrets.LEGAL_VAT_STATUS }}
          LEGAL_VAT_ID: ${{ secrets.LEGAL_VAT_ID }}
          LEGAL_PRODUCTION_READY: ${{ vars.LEGAL_PRODUCTION_READY || 'false' }}
          LEGAL_RECORD_RETENTION_YEARS: ${{ vars.LEGAL_RECORD_RETENTION_YEARS || '7' }}
          LEGAL_RECORD_RETENTION_BASIS_CONFIRMED: ${{ vars.LEGAL_RECORD_RETENTION_BASIS_CONFIRMED || 'false' }}
        run: ./scripts/deploy.sh

      - name: Write deployment summary
        if: success()
        env:
          AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
        run: |
          APP_FQDN="$(az containerapp show -n airco-tracking-web -g "$AZURE_RESOURCE_GROUP" --query properties.configuration.ingress.fqdn -o tsv)"
          {
            echo "## Azure deployment"
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- App: [airco-tracking-web](https://${APP_FQDN})"
            echo "- Resource group: \`${AZURE_RESOURCE_GROUP}\`"
          } >> "$GITHUB_STEP_SUMMARY"
